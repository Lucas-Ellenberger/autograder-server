name: Main

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  main:

    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.0'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-${{ env.pythonLocation }}-${{ hashFiles('testdata/requirements.txt') }}

      - name: Determine Target Repo and Branch
        id: determine-repo-and-branch
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "BRANCH_NAME=${{ github.ref_name }}"
            echo "REPO_NAME=${{ github.repository_owner }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BRANCH_NAME=${{ github.event.pull_request.head.ref }}"
            echo "REPO_NAME=${{ github.event.pull_request.head.repo.owner }}"
          else
            echo "BRANCH_NAME=main"
            echo "REPO_NAME=edulinq"
          fi

          if [[ "$BRANCH_NAME" == *"API/"* ]]; then
            echo "TARGET_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
            echo "TARGET_REPO=$REPO_NAME" >> $GITHUB_ENV
          else
            echo "TARGET_BRANCH=main" >> $GITHUB_ENV
            echo "TARGET_REPO=edulinq" >> $GITHUB_ENV
          fi

      - name: Install Python Interface
        run: ./.ci/install_py_interface.sh ${{ env.TARGET_REPO_OWNER }} ${{ env.TARGET_BRANCH }}

      - name: Build
        run: ./scripts/build.sh

      - name: Check Formatting
        run: ./scripts/check_formatting.sh

      - name: Check Duplicate API Locators
        run: ./scripts/check_duplicate_api_locators.sh

      - name: Run Base Tests
        env:
          AUTOGRADER__DOCKER__DISABLE: 'true'
        run: ./scripts/run_tests.sh

      - name: Run Submission Tests
        env:
          AUTOGRADER__DOCKER__DISABLE: 'true'
        run: ./.ci/run_remote_tests.sh

      - name: Verify Python Interface Test Data
        env:
          AUTOGRADER__DOCKER__DISABLE: 'true'
        run: ./.ci/verify_py_test_data.sh
